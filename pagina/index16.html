<DOCTYPE html>
<HTML lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=decice-width, inicial-scale=1.0">
	<title></title>
<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.contenedor{
    background-color: white;
    width: 400px;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align: center;
    color: #1e3a5f;
    margin-bottom: 20px;
}

label{
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input[type="text"],
input[type="email"],
input[type="password"],
input[type="number"],
select,
textarea{
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
}

textarea{
    resize: vertical;
}

.opciones{
    margin-top: 8px;
}

.botones{
    text-align: center;
    margin-top: 20px;
}

input[type="submit"],
input[type="reset"]{
    background-color: #1e3a5f;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 5px;
    cursor: pointer;
}

input[type="submit"]:hover,
input[type="reset"]:hover{
    background-color: #1565c0;
}
</style>
</head>
<body>
<div class="contenedor">
	<h1>Datos de Cuenta</h1>

<form>

<label for="nombre">Nombre</label>
<input type="text" id="nombre" placeholder="Escribe tu nombre">

<label for="nombre">Correo</label>

<label>Genero</label>
<div class="opciones">
	<input type="radio" name="marca" id="Windows">
	<label for="Windows">Hombre</label>

	<input type="radio" name="marca" id="Mac">
	<label for="Mac">Mujer</label>
        
         <input type="radio" name="marca" id="Linux">
	<label for="Linux"></label>
</div>
</select>
<label for="comentarios">DESCRIPCION QUE FALTE</label>
<textarea id="comentarios" rows="4"></textarea>

</label>
<div class="botones">

<button type="button" onclick="window.location.href='index.html'">
    Salir
</button>
<input type="reset" value="Limpiar">
